<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Session Entry</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 20%;
    }
    #loading {
      font-size: 1.5em;
      color: #333;
    }
  </style>
  <script>
    // Redirect after 5 seconds
    setTimeout(function() {
      document.getElementById("loading").innerText = "Teleporting...";
      window.location.href = "/session/123"; // target session URL
    }, 5000);
  </script>
</head>
<body>
  <div id="loading">Loading, please wait...</div>
</body>
</html>
